<div id="utaf-mini-{{ id }}" class="utaf-lab-embed"></div>
<script src="/js/animation-lab/core.js"></script>
<script src="/js/animation-lab/ui.js"></script>
<script>
(function() {
  var container = document.getElementById('utaf-mini-{{ id }}');
  initAnimationLab(container, '{{ data | safe }}', {
    mini: {% if mini is defined and mini == "false" %}false{% else %}true{% endif %},
    labUrl: '{{ lab_url | default(value="") | safe }}'
  });
})();
</script>
