<div id="utrp-mini-{{ id }}" class="utrp-lab-embed"></div>
<script src="/js/animation-lab/ir-core.js"></script>
<script src="/js/animation-lab/codegen-panel.js"></script>
<script src="/js/animation-lab/ui.js"></script>
<script>
(function() {
  var container = document.getElementById('utrp-mini-{{ id }}');
  initAnimationLab(container, '{{ data | safe }}', {
    mini: {% if mini is defined and mini == "false" %}false{% else %}true{% endif %},
    labUrl: '{{ lab_url | default(value="") | safe }}'
  });
})();
</script>
